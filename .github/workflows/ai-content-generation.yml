name: AI Content Generation

on:
  schedule:
    # Generate content every Tuesday and Friday at 8 AM UTC
    - cron: '0 8 * * 2'  # Tuesday
    - cron: '0 8 * * 5'  # Friday
  workflow_dispatch:
    inputs:
      topic_override:
        description: 'Override topic for content generation'
        required: false
        type: string
      target_date:
        description: 'Target publication date (YYYY-MM-DD)'
        required: false
        type: string

env:
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

jobs:
  generate-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required: Commit generated content
      actions: read  # Required: Read workflow state
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Install dependencies
        run: |
          cd .github/scripts
          pnpm install
          echo "Dependencies installed:"
          pnpm list

      - name: Generate content
        id: generate
        run: |
          echo "🚀 Starting AI content generation..."
          cd .github/scripts
          node generate-content.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TOPIC_OVERRIDE: ${{ github.event.inputs.topic_override }}
          TARGET_DATE: ${{ github.event.inputs.target_date }}

      - name: Commit generated content
        if: steps.generate.outputs.content_created == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action AI"
          git add apps/blog/src/content/drafts/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "feat: add AI-generated blog post - ${{ steps.generate.outputs.post_title }}"
            git push
            echo "✅ Content committed and pushed successfully"
          fi

      - name: Notify on failure
        if: failure()
        run: |
          gh issue create \
            --title "🚨 Workflow Failed: AI Content Generation" \
            --label "bug,automation" \
            --body "**Workflow Run**: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

**Status**: Failed ❌

**Timestamp**: ${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}

**Action Required**: Check the workflow run logs to debug and fix the issue.

---
*Automated failure notification*"

      - name: Summary
        if: steps.generate.outputs.content_created == 'true'
        run: |
          echo "✅ Content generated successfully!"
          echo "📝 Post: ${{ steps.generate.outputs.post_title }}"
          echo "📅 Target Date: ${{ steps.generate.outputs.target_date }}"
          echo "📊 Word Count: ${{ steps.generate.outputs.word_count }}"
          echo "🎯 Topic: ${{ steps.generate.outputs.topic }}"
          echo "📂 File: ${{ steps.generate.outputs.slug }}.md"
          echo ""
          echo "The content has been added to drafts and will be published automatically"
          echo "on the next scheduled publication date (Tuesday or Friday)."